<!DOCTYPE html>
<html>
<head>
    <title>My Styled Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
        }

        h1 {
            margin: 0;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        footer {
            margin-top: 30px;
            background-color: #222;
            color: white;
            padding: 10px;
        }
    </style>

</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <p>This is a simple website with dog image.</p>

    <img src="dog.jpg" alt="My Image">

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
